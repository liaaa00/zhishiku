services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://internal_ai:${POSTGRES_PASSWORD:-internal-ai-change-me}@postgres:5432/internal_ai_assistant}
    expose:
      - "8000"
    volumes:
      - ./backend/data/uploads:/app/data/uploads
      - ./backend/data/pageindex:/app/data/pageindex
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  migrate-sqlite-to-postgres:
    build: ./backend
    env_file: .env
    profiles: ["migration"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://internal_ai:${POSTGRES_PASSWORD:-internal-ai-change-me}@postgres:5432/internal_ai_assistant}
    volumes:
      - ./backend/data/app.db:/app/data/app.db:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "scripts/migrate_sqlite_to_postgres.py", "--drop-target", "--reset-target"]

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-internal_ai_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-internal_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-internal-ai-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 4 bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /readyz HTTP/1.0\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    restart: unless-stopped
    environment:
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3}
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama show $${OLLAMA_EMBEDDING_MODEL} >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  qdrant_storage:
  ollama_data: